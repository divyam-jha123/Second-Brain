name: Backend CI

on:
  pull_request:
    paths:
      - "brainly-backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
    paths:
      - "brainly-backend/**"
      - ".github/workflows/backend-ci.yml"

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: brainly-backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: brainly-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Tests (if configured)
        run: |
          if node -e "process.exit(require('./package.json')?.scripts?.['test:ci'] ? 0 : 1)"; then
            npm run test:ci
          elif node -e "process.exit(require('./package.json')?.scripts?.test ? 0 : 1)"; then
            npm test
          else
            echo "No tests configured for backend (missing test or test:ci script)."
          fi
